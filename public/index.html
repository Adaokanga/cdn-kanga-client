<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN KANGA • TERMINAL</title>
    <style>
        /* [Mantendo seu estilo original que você disse estar bom] */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0c0f; color: white; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .menu-card { background: #1a1d23; padding: 20px; border: 1px solid #333; border-radius: 10px; cursor: pointer; text-align: center; transition: 0.3s; }
        .menu-card:hover, .menu-card.active { border-color: cyan; box-shadow: 0 0 15px cyan; }
        .action-panel { background: #14171c; padding: 30px; border-radius: 15px; border: 1px solid #00ffff55; }
        .form-group { margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid cyan; color: white; border-radius: 5px; font-family: 'Fira Code', monospace; }
        .btn { width: 100%; padding: 15px; background: cyan; color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #terminal { background: #000; padding: 15px; border-radius: 5px; height: 150px; overflow-y: auto; font-family: 'Fira Code', monospace; margin-top: 20px; font-size: 0.8rem; border: 1px solid #333; }
        .success { color: #00ff88; } .error { color: #ff4444; } .info { color: #00ccff; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center; color:cyan; text-shadow: 0 0 10px cyan;">CDN KANGA</h1>
        
        <div class="menu-grid">
            <div class="menu-card active" onclick="selectOption(1)"><h3>🛒 COMPRAR</h3></div>
            <div class="menu-card" onclick="selectOption(2)"><h3>📤 ATIVAR</h3></div>
            <div class="menu-card" onclick="selectOption(3)"><h3>🔄 RENOVAR</h3></div>
        </div>

        <div class="action-panel">
            <h2 id="actionTitle">🛒 COMPRAR TOKEN</h2>
            
            <div id="formComprar">
                <div class="form-group">
                    <label>Provedor</label>
                    <select id="buyProvider"><option value="cachefly">CACHELY</option></select>
                </div>
                <div class="form-group">
                    <label>Plano</label>
                    <select id="buyPlan">
                        <option value="semanal">Semanal (7 dias)</option>
                        <option value="bissemanal">Bissemanal (15 dias)</option>
                        <option value="mensal">Mensal (30 dias)</option>
                    </select>
                </div>
                <button class="btn" onclick="comprarToken()">GERAR LINK DE PAGAMENTO</button>
            </div>

            <div id="formAtivar" style="display:none;">
                <div class="form-group">
                    <label>IP da sua VPS</label>
                    <input type="text" id="activateIp" placeholder="Ex: 151.244.x.x">
                </div>
                <div class="form-group">
                    <label>Arquivo PDF (Token)</label>
                    <input type="file" id="activateFile" accept=".pdf">
                </div>
                <button class="btn" onclick="ativarCDN()">ATIVAR CDN AGORA</button>
            </div>

            <div id="formRenovar" style="display:none;">
                <div class="form-group">
                    <label>Domínio para Renovar</label>
                    <input type="text" id="renewDomain" placeholder="cdn1234.waveplusnet.shop">
                </div>
                <button class="btn" onclick="renovarCDN()">SOLICITAR RENOVAÇÃO</button>
            </div>
        </div>

        <div id="terminal"></div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;

        function addTerminalMessage(msg, type = 'info') {
            const t = document.getElementById('terminal');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `> ${new Date().toLocaleTimeString()}: ${msg}`;
            t.appendChild(div);
            t.scrollTop = t.scrollHeight;
        }

        function selectOption(opt) {
            document.querySelectorAll('.menu-card').forEach((c, i) => c.classList.toggle('active', i+1 === opt));
            document.getElementById('formComprar').style.display = opt === 1 ? 'block' : 'none';
            document.getElementById('formAtivar').style.display = opt === 2 ? 'block' : 'none';
            document.getElementById('formRenovar').style.display = opt === 3 ? 'block' : 'none';
            document.getElementById('actionTitle').textContent = opt === 1 ? '🛒 COMPRAR TOKEN' : opt === 2 ? '📤 ATIVAR CDN' : '🔄 RENOVAR';
        }

        async function comprarToken() {
            const provider = document.getElementById('buyProvider').value;
            const plan = document.getElementById('buyPlan').value;
            addTerminalMessage(`Solicitando link para ${plan}...`);
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/comprar`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ provider, plan })
                });
                const data = await res.json();
                if (data.success) {
                    addTerminalMessage(`✅ Link gerado! Redirecionando...`, 'success');
                    window.open(data.payment_link, '_blank');
                } else {
                    addTerminalMessage(`❌ Erro: ${data.error}`, 'error');
                }
            } catch (e) { addTerminalMessage(`❌ Erro de conexão`, 'error'); }
        }

        async function ativarCDN() {
            const ip = document.getElementById('activateIp').value;
            const file = document.getElementById('activateFile').files[0];
            if (!ip || !file) return addTerminalMessage('❌ Preencha todos os campos!', 'error');

            const formData = new FormData();
            formData.append('pdf', file);
            formData.append('ip', ip);

            addTerminalMessage('📤 Enviando PDF para processamento...');
            try {
                const res = await fetch(`${API_BASE_URL}/api/enviar-pdf`, { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    addTerminalMessage(`✅ CDN Ativada: ${data.domain}`, 'success');
                } else {
                    addTerminalMessage(`❌ Falha: ${data.error}`, 'error');
                }
            } catch (e) { addTerminalMessage(`❌ Erro de comunicação`, 'error'); }
        }

        async function renovarCDN() {
            const dominio = document.getElementById('renewDomain').value;
            if (!dominio) return addTerminalMessage('❌ Informe o domínio!', 'error');

            addTerminalMessage(`Solicitando renovação para ${dominio}...`);
            try {
                const res = await fetch(`${API_BASE_URL}/api/renovar`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ dominio })
                });
                const data = await res.json();
                if (data.success) {
                    addTerminalMessage(`✅ Pedido de renovação enviado com sucesso!`, 'success');
                } else {
                    addTerminalMessage(`❌ Erro: ${data.error}`, 'error');
                }
            } catch (e) { addTerminalMessage(`❌ Erro ao conectar ao servidor`, 'error'); }
        }

        // Testar conexão ao carregar
        window.onload = async () => {
            try {
                const res = await fetch(`${API_BASE_URL}/api/status`);
                const data = await res.json();
                addTerminalMessage(data.success ? '✅ Sistema Online' : '⚠️ Sistema Offline', data.success ? 'success' : 'error');
            } catch (e) { addTerminalMessage('❌ Backend não está respondendo', 'error'); }
        };
    </script>
</body>
</html>
